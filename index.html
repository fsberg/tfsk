// APP
// ══════════════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(null);
  const [users,setUsers]=useState(ALL_USERS);
  const [tab,setTab]=useState("news");
  const [news,setNews]=useState(INIT_NEWS);
  const [posts,setPosts]=useState(INIT_POSTS);
  const [catches,setCatches]=useState(INIT_CATCHES);
  const [events,setEvents]=useState(INIT_EVENTS);
  const [notifs,setNotifs]=useState(INIT_NOTIFS);
  const [toastMsg,setToastMsg]=useState(null);
  const [showNotifs,setShowNotifs]=useState(false);
  const [showUserMenu,setShowUserMenu]=useState(false);
  const [viewProfile,setViewProfile]=useState(null); // user id to view

  const toast=m=>{setToastMsg(m);setTimeout(()=>setToastMsg(null),3000);};
  const unread=notifs.filter(n=>!n.read).length;

  function goProfile(uid){setViewProfile(uid);setTab("viewprofile");}

  // Keep user object in sync with users array
  const currentUser=user?users.find(u=>u.id===user.id)||user:null;

  if(!currentUser)return(<div className="app"><style>{CSS}</style><LoginScreen onLogin={u=>{setUser(u);setTab("news");}}/></div>);

  const tabs=[
    {key:"news",label:"Nyheter",icon:"📰",cnt:news.length},
    {key:"board",label:"Anslagstavla",icon:"💬",cnt:posts.length},
    {key:"calendar",label:"Kalender",icon:"📅",cnt:events.filter(e=>new Date(e.date+"T23:59:59")>=new Date()).length},
    {key:"catches",label:"Fångster",icon:"🐟",cnt:catches.length},
    {key:"docs",label:"Dokument",icon:"📁"},
    {key:"lakes",label:"Våra Sjöar",icon:"🏞️",cnt:LAKES.length},
    {key:"members",label:"Medlemmar",icon:"👥",cnt:users.filter(u=>u.active).length},
  ];

  return(<div className="app"><style>{CSS}</style>
    <header className="hdr"><div className="hdr-in">
      <div className="logo" onClick={()=>{setTab("news");setViewProfile(null);}}><img src={CLUB_BANNER} alt="TFSK" style={{height:38,width:"auto"}}/></div>
      <div className="hdr-right">
        <div style={{position:"relative"}}>
          <button className="bell" onClick={()=>{setShowNotifs(!showNotifs);setShowUserMenu(false);}}>🔔{unread>0&&<div className="bell-dot"/>}</button>
          {showNotifs&&<NotifDropdown notifs={notifs} setNotifs={setNotifs} onClose={()=>setShowNotifs(false)}/>}
        </div>
        <div style={{position:"relative"}}>
          <button className="hdr-user" onClick={()=>{setShowUserMenu(!showUserMenu);setShowNotifs(false);}}><div className="hdr-av" style={{width:28,height:28,fontSize:11}}>{currentUser.avatar?<img src={currentUser.avatar} alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>:initials(currentUser.name)}</div><span>{currentUser.name.split(" ")[0]}</span><span style={{fontSize:10,opacity:0.7}}>{showUserMenu?"▲":"▼"}</span></button>
          {showUserMenu&&<div style={{position:"absolute",top:44,right:0,width:200,background:"var(--w)",borderRadius:"var(--rl)",boxShadow:"var(--sh2)",border:"1px solid var(--b)",zIndex:200,overflow:"hidden"}}>
            <button onClick={()=>{setTab("profile");setViewProfile(null);setShowUserMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"12px 16px",border:"none",background:"none",cursor:"pointer",fontFamily:"var(--fb)",fontSize:13,color:"var(--t)",transition:"background 0.1s",textAlign:"left"}} onMouseEnter={e=>e.currentTarget.style.background="var(--s)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>⚙️ Min profil</button>
            <div style={{height:1,background:"var(--b)"}}/>
            <button onClick={()=>{setUser(null);setTab("news");setViewProfile(null);setShowUserMenu(false);}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"12px 16px",border:"none",background:"none",cursor:"pointer",fontFamily:"var(--fb)",fontSize:13,color:"var(--red)",transition:"background 0.1s",textAlign:"left"}} onMouseEnter={e=>e.currentTarget.style.background="var(--red-p)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>🚪 Logga ut</button>
          </div>}
        </div>
      </div>
    </div></header>

    <nav className="nav"><div className="nav-in">
      {tabs.map(t=><button key={t.key} className={`nt ${tab===t.key?"a":""}`} onClick={()=>{setTab(t.key);setViewProfile(null);}}>{t.icon} {t.label}{t.cnt!=null&&<span className="badge">{t.cnt}</span>}</button>)}
    </div></nav>

    <main className="mn" onClick={()=>{if(showNotifs)setShowNotifs(false);if(showUserMenu)setShowUserMenu(false);}}>
      {tab==="news"&&<NewsTab user={currentUser} news={news} setNews={setNews} toast={toast} notifs={notifs} setNotifs={setNotifs}/>}
      {tab==="board"&&<BoardTab user={currentUser} posts={posts} setPosts={setPosts} toast={toast} goProfile={goProfile}/>}
      {tab==="calendar"&&<CalendarTab user={currentUser} events={events} setEvents={setEvents} toast={toast}/>}
      {tab==="catches"&&<CatchTab user={currentUser} catches={catches} setCatches={setCatches} toast={toast} goProfile={goProfile}/>}
      {tab==="docs"&&<DocsTab user={currentUser} toast={toast}/>}
      {tab==="lakes"&&<LakesTab catches={catches}/>}
      {tab==="members"&&<MembersTab user={currentUser} users={users} setUsers={setUsers} toast={toast} goProfile={goProfile}/>}
      {tab==="profile"&&<ProfileView currentUser={currentUser} targetUser={currentUser} setUsers={setUsers} catches={catches} toast={toast} isOwnProfile={true} goBack={()=>setTab("news")}/>}
      {tab==="viewprofile"&&viewProfile&&<ProfileView currentUser={currentUser} targetUser={users.find(u=>u.id===viewProfile)||currentUser} setUsers={setUsers} catches={catches} toast={toast} isOwnProfile={viewProfile===currentUser.id} goBack={()=>setTab("members")}/>}
    </main>

    {toastMsg&&<div className="toast">{toastMsg}</div>}
  </div>);
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
